name: QA Pipeline — Protect Construction Payroll

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  protect-payroll:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Verify env variables exist
        run: |
          if [ -z "$DB_HOST" ]; then
            echo "MISSING ENV: DB_HOST — this caused Incident 1"
            exit 1
          fi
        env:
          DB_HOST: ${{ secrets.DB_HOST }}

      - name: Run tests
        run: npm test --if-present
